<svg viewBox="0 0 200 210" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Outer ring -->
  <circle cx="100" cy="97" r="96" fill="white" stroke="#005FAD" stroke-width="2.5"/>
  <!-- Inner dashed ring -->
  <circle cx="100" cy="97" r="86" fill="none" stroke="#00968C" stroke-width="0.9" stroke-dasharray="4 3"/>

  <!-- 4 diamonds in 2×2 — each base rect 38×38 rotated 45° -->
  <!-- Top-left: TEAL -->
  <rect x="35" y="35" width="38" height="38" rx="3" fill="#00968C"
        transform="rotate(45 54 54)"/>
  <!-- Top-right: BLUE -->
  <rect x="97" y="35" width="38" height="38" rx="3" fill="#005FAD"
        transform="rotate(45 116 54)"/>
  <!-- Bottom-left: BLUE -->
  <rect x="35" y="89" width="38" height="38" rx="3" fill="#005FAD"
        transform="rotate(45 54 108)"/>
  <!-- Bottom-right: TEAL -->
  <rect x="97" y="89" width="38" height="38" rx="3" fill="#00968C"
        transform="rotate(45 116 108)"/>

  <!-- Center connector: white diamond -->
  <rect x="88" y="75" width="24" height="24" rx="2" fill="white"
        transform="rotate(45 100 87)"/>

  <!-- Small accent diamonds -->
  <rect x="84" y="20" width="14" height="14" rx="1.5" fill="#00968C" opacity="0.22"
        transform="rotate(45 91 27)"/>
  <rect x="84" y="142" width="14" height="14" rx="1.5" fill="#005FAD" opacity="0.22"
        transform="rotate(45 91 149)"/>
  <rect x="22" y="80" width="14" height="14" rx="1.5" fill="#005FAD" opacity="0.22"
        transform="rotate(45 29 87)"/>
  <rect x="148" y="80" width="14" height="14" rx="1.5" fill="#00968C" opacity="0.22"
        transform="rotate(45 155 87)"/>

  <!-- Separator line -->
  <line x1="40" y1="157" x2="160" y2="157" stroke="#E2E8F0" stroke-width="0.8"/>

  <!-- Arabic text — مكتب التكوين المهني -->
  <text x="100" y="171"
        text-anchor="middle"
        font-family="'Segoe UI', 'Arial', sans-serif"
        font-size="11"
        font-weight="600"
        fill="#005FAD">مكتب التكوين المهني</text>

  <!-- Arabic text — وإنعاش الشغل -->
  <text x="100" y="184"
        text-anchor="middle"
        font-family="'Segoe UI', 'Arial', sans-serif"
        font-size="11"
        font-weight="600"
        fill="#005FAD">وإنعاش الشغل</text>

  <!-- Tagline -->
  <text x="100" y="198"
        text-anchor="middle"
        font-family="'Segoe UI', 'Arial', sans-serif"
        font-size="8.5"
        fill="#6B7280">الطريق الأثير للمستقبل</text>
</svg>
