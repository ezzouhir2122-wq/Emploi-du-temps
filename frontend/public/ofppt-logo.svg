<svg viewBox="0 0 160 160" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Outer ring -->
  <circle cx="80" cy="80" r="78" fill="white" stroke="#005FAD" stroke-width="2.5"/>
  <circle cx="80" cy="80" r="70" fill="white" stroke="#00968C" stroke-width="0.8" stroke-dasharray="4 3"/>

  <!-- Diamond grid: 4 large diamonds (2x2) in OFPPT blue + teal -->
  <!-- Top-left diamond: TEAL -->
  <rect x="27" y="27" width="38" height="38" rx="3" fill="#00968C"
        transform="rotate(45 46 46)"/>
  <!-- Top-right diamond: BLUE -->
  <rect x="95" y="27" width="38" height="38" rx="3" fill="#005FAD"
        transform="rotate(45 114 46)"/>
  <!-- Bottom-left diamond: BLUE -->
  <rect x="27" y="95" width="38" height="38" rx="3" fill="#005FAD"
        transform="rotate(45 46 114)"/>
  <!-- Bottom-right diamond: TEAL -->
  <rect x="95" y="95" width="38" height="38" rx="3" fill="#00968C"
        transform="rotate(45 114 114)"/>

  <!-- Center connector diamond: white -->
  <rect x="68" y="68" width="24" height="24" rx="2" fill="white"
        transform="rotate(45 80 80)"/>

  <!-- Inner accent diamonds (small, offset) -->
  <rect x="72" y="40" width="16" height="16" rx="1.5" fill="#00968C" opacity="0.25"
        transform="rotate(45 80 48)"/>
  <rect x="72" y="104" width="16" height="16" rx="1.5" fill="#005FAD" opacity="0.25"
        transform="rotate(45 80 112)"/>
  <rect x="40" y="72" width="16" height="16" rx="1.5" fill="#005FAD" opacity="0.25"
        transform="rotate(45 48 80)"/>
  <rect x="104" y="72" width="16" height="16" rx="1.5" fill="#00968C" opacity="0.25"
        transform="rotate(45 112 80)"/>
</svg>
